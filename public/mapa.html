<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa — FaunaScan</title>
  <link rel="stylesheet" href="assets/styles/mapa.css?v=8">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" aria-label="Menú principal">
      <a href="index.html" class="sidebar__header">
        <img src="assets/images/LogoFaunaScan.png" alt="FaunaScan" class="sidebar__logo-img">        <span class="sidebar__logo-text">FaunaScan</span>
      </a>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link">
          <img src="assets/icons/Principal.png" class="sidebar__icon">Principal</a>
        <a href="registrar.html" class="sidebar__link">
          <img src="assets/icons/Registrar.png" class="sidebar__icon">Registrar</a>
        <a href="mapa.html" class="sidebar__link">
          <img src="assets/icons/Mapa.png" class="sidebar__icon active">Mapa</a>
        <a href="reportes.html" class="sidebar__link">
          <img src="assets/icons/Reportes.png" class="sidebar__icon">Reportes</a>
        <a href="historial.html" class="sidebar__link">
          <img src="assets/icons/Historial.png" class="sidebar__icon">Historial</a>
      </nav>
    </aside>
    <div class="sidebar-overlay"></div>

    <main class="app-content">
      <div class="app-topbar">
        <button class="sidebar-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="app-topbar__title">Mapa de avistamientos</h1>
      </div>

      <div class="mapa-mock" id="mapaMock">

        <input class="mapa-mock__search" id="mapaFiltroInput" type="text" placeholder="Aplicar filtros">

        <button class="mapa-mock__calor" id="btnToggleCalor" aria-label="Mapa de calor">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <span>Calor</span>
        </button>

        <div class="mapa-mock__controls">
          <button class="mapa-ctrl-btn" id="btnZoomIn" aria-label="Acercar">+</button>
          <button class="mapa-ctrl-btn" id="btnZoomOut" aria-label="Alejar">−</button>
          <button class="mapa-ctrl-btn" id="btnLocate" aria-label="Mi ubicación">◎</button>
        </div>

        <div class="mapa-mock__terrain" id="mapaTerrain">
          <div class="mapa-mock__pins" id="mapaPinsLayer">
            <button class="mapa-pin" style="top:28%;left:62%;" data-nombre="Cóndor Andino" data-cientifico="Vultur gryphus" data-emoji="🦅" data-zona="Bosque de Zárate" data-estado="Validado" data-color="yellow" aria-label="Avistamiento Cóndor Andino"></button>
            <button class="mapa-pin" style="top:62%;left:24%;" data-nombre="Jaguar" data-cientifico="Panthera onca" data-emoji="🐆" data-zona="Reserva Amazónica" data-estado="Pendiente" data-color="red" aria-label="Avistamiento Jaguar"></button>

            <button class="mapa-mock__paw" id="btnMapaPaw" data-nombre="Oso de Anteojos" data-cientifico="Tremarctos ornatus" data-emoji="🐻" data-zona="Bosque El Olivar" data-estado="Validado" data-color="green" aria-label="Cúmulo de avistamientos">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="7" r="2.3"/><circle cx="17" cy="7" r="2.3"/><circle cx="4" cy="14" r="2"/><circle cx="20" cy="14" r="2"/><ellipse cx="12" cy="17" rx="5.5" ry="4.5"/></svg>
            </button>
            <span class="mapa-mock__pin-flag" id="mapaPinFlag">📍</span>
          </div>
        </div>

        <div class="mapa-mock__card" id="mapaCard">
          <div class="mapa-mock__card-img" id="cardEmoji">🐻</div>
          <div class="mapa-mock__card-info">
            <h4 id="cardNombre">Oso de Anteojos</h4>
            <p class="mapa-mock__card-cientifico" id="cardCientifico">Tremarctos ornatus</p>
            <p class="mapa-mock__card-meta">📍 Hoy, 14:25 - <span id="cardZona">Bosque El Olivar</span></p>
            <span class="badge badge-green" id="cardEstado">Validado</span>
          </div>
        </div>

        <div class="mapa-mock-legend">
          <div class="mapa-mock-legend__row"><span class="legend-dot legend-dot--red"></span><span>En peligro crítico</span></div>
          <div class="mapa-mock-legend__row"><span class="legend-dot legend-dot--yellow"></span><span>Vulnerable</span></div>
          <div class="mapa-mock-legend__row"><span class="legend-dot legend-dot--green"></span><span>Preocupación menor</span></div>
        </div>

        <div class="mapa-zoom-badge" id="mapaZoomBadge">Zoom: 100%</div>
      </div>
    </main>
  </div>
  <script src="assets/scripts/mapa.js?v=6" defer></script>
</body>
</html>
