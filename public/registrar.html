<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar avistamiento — FaunaScan</title>
  <link rel="stylesheet" href="assets/styles/registrar.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="index.html" class="sidebar__header">
        <img src="assets/images/LogoFaunaScan.png" alt="Logo de FaunaScan" class="sidebar__logo">
        <span class="sidebar__logo-text">FaunaScan</span>
      </a>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Principal</a>
        <a href="registrar.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Registrar</a>
        <a href="mapa.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Mapa</a>
        <a href="reportes.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reportes</a>
        <a href="historial.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Historial</a>
      </nav>
    </aside>
    <div class="sidebar-overlay"></div>

    <main class="app-content">
      <div class="app-topbar">
        <button class="sidebar-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="app-topbar__title">Nuevo avistamiento</h1>
        <div class="app-topbar__actions">
          <a href="notificaciones.html" class="app-topbar__action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Alertas</a>
          <a href="perfil.html" class="app-topbar__action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</a>
        </div>
      </div>

      <div class="registrar-layout">
        <div class="registrar-left">
          <div class="card">
            <div class="upload-area" id="uploadArea">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <p class="upload-area__text">Arrastra una foto o <span>haz clic para subir</span></p>
              <input type="file" id="fotoInput" accept="image/*" style="display:none">
            </div>
            <div class="ia-toggle">
              <label class="toggle-label">
                <input type="checkbox" id="iaToggle" checked>
                <span class="toggle-switch"></span>
                <span>Identificar especie con IA</span>
              </label>
            </div>
          </div>

          <div class="card">
            <h3 class="card__title">Especie detectada</h3>
            <div class="especies-chips" id="especiesChips">
              <button class="chip chip--active">🐻 Oso de anteojos</button>
              <button class="chip">🦅 Cóndor andino</button>
              <button class="chip">🐆 Jaguar</button>
              <button class="chip">🦜 Guacamayo</button>
              <button class="chip">Otra especie</button>
            </div>
          </div>
        </div>

        <div class="registrar-right">
          <div class="card">
            <h3 class="card__title">Detalles del avistamiento</h3>
            <div class="form-group">
              <label class="form-label">Observaciones</label>
              <textarea class="form-input" rows="3" placeholder="Descripción del avistamiento, comportamiento observado..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Fecha y hora</label>
              <input class="form-input" type="datetime-local" id="fechaAvistamiento">
            </div>
            <div class="form-group">
              <label class="form-label">Área protegida</label>
              <input class="form-input" type="text" placeholder="Ej: Bosque El Olivar">
            </div>
          </div>

          <div class="card">
            <h3 class="card__title">Ubicación</h3>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Latitud</label>
                <input class="form-input" type="number" id="latInput" placeholder="-12.0464" step="0.0001">
              </div>
              <div class="form-group">
                <label class="form-label">Longitud</label>
                <input class="form-input" type="number" id="lngInput" placeholder="-77.0428" step="0.0001">
              </div>
            </div>
            <button class="btn btn-outline btn-sm" id="btnGeolocate">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
              Usar mi ubicación actual
            </button>
            <button class="btn btn-primary btn-full" id="btnGuardar" style="margin-top:1rem">Guardar avistamiento</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/scripts/registrar.js" defer></script>
</body>
</html>
